# Local manual stack for inspecting the NetsGo UI with one server and two clients.
# Build requires embedded frontend assets, so run `make build-web` before the first `up --build`
# if `web/dist` does not exist.

x-netsgo-dev-image: &netsgo-dev-image
  image: netsgo-dev:local
  build:
    context: .
    dockerfile: Dockerfile
    target: e2e

services:
  server:
    <<: *netsgo-dev-image
    hostname: netsgo-dev-server
    command:
      - server
      - --port
      - "9527"
      - --allow-loopback-management-host
      - --init-admin-username
      - ${NETSGO_DEV_ADMIN_USER:-admin}
      - --init-admin-password
      - ${NETSGO_DEV_ADMIN_PASS:-password123}
      - --init-server-addr
      - ${NETSGO_DEV_SERVER_ADDR:-http://localhost:9527}
      - --tls-mode
      - off
    ports:
      - "${NETSGO_DEV_SERVER_PORT:-9527}:9527"
    volumes:
      - netsgo-dev-server-data:/var/lib/netsgo

  client-key:
    <<: *netsgo-dev-image
    hostname: netsgo-dev-client-key
    entrypoint:
      - /bin/sh
      - /opt/netsgo-e2e/create-client-key.sh
    environment:
      NETSGO_BOOTSTRAP_BASE_URL: http://server:9527
      NETSGO_ADMIN_USER: ${NETSGO_DEV_ADMIN_USER:-admin}
      NETSGO_ADMIN_PASS: ${NETSGO_DEV_ADMIN_PASS:-password123}
      NETSGO_CLIENT_KEY_FILE: /shared/client.key
      NETSGO_ADMIN_TOKEN_FILE: /shared/admin.token
      NETSGO_READY_FILE: /shared/client-key.ready
      NETSGO_BOOTSTRAP_WAIT_TIMEOUT: ${NETSGO_DEV_BOOTSTRAP_WAIT_TIMEOUT:-180}
      NETSGO_MANAGEMENT_HOST: ${NETSGO_DEV_MANAGEMENT_HOST:-localhost:9527}
    volumes:
      - netsgo-dev-shared:/shared
    depends_on:
      - server

  client-a:
    <<: *netsgo-dev-image
    hostname: ${NETSGO_DEV_CLIENT_A_HOSTNAME:-netsgo-dev-client-a}
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /opt/netsgo-e2e/run-client.sh
    environment:
      NETSGO_SERVER: http://server:9527
      NETSGO_CLIENT_KEY_FILE: /shared/client.key
      NETSGO_CLIENT_KEY_WAIT_TIMEOUT: ${NETSGO_DEV_CLIENT_KEY_WAIT_TIMEOUT:-180}
    volumes:
      - netsgo-dev-client-a-data:/var/lib/netsgo
      - netsgo-dev-shared:/shared
    depends_on:
      - client-key

  client-b:
    <<: *netsgo-dev-image
    hostname: ${NETSGO_DEV_CLIENT_B_HOSTNAME:-netsgo-dev-client-b}
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /opt/netsgo-e2e/run-client.sh
    environment:
      NETSGO_SERVER: http://server:9527
      NETSGO_CLIENT_KEY_FILE: /shared/client.key
      NETSGO_CLIENT_KEY_WAIT_TIMEOUT: ${NETSGO_DEV_CLIENT_KEY_WAIT_TIMEOUT:-180}
    volumes:
      - netsgo-dev-client-b-data:/var/lib/netsgo
      - netsgo-dev-shared:/shared
    depends_on:
      - client-key

volumes:
  netsgo-dev-client-a-data:
  netsgo-dev-client-b-data:
  netsgo-dev-server-data:
  netsgo-dev-shared:
