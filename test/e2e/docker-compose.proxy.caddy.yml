services:
  proxy:
    image: caddy:2.10-alpine
    hostname: system-proxy
    ports:
      - "${PROXY_PORT:-19080}:80"
    environment:
      UPSTREAM_HOST: server
      UPSTREAM_PORT: "8080"
    volumes:
      - ${NETSGO_E2E_DIR:-.}/test/e2e/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - server
    networks:
      - control
