name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          scripts/validate-release-tag.sh "$tag"
          scripts/validate-beta-increment.sh "$tag"

  web-dist:
    runs-on: ubuntu-latest
    needs: release-gate
    steps:
      - uses: actions/checkout@v6
      - name: Reject non-Bun lockfiles in frontend workspaces
        run: |
          ! find web desktop -maxdepth 1 \( -name 'package-lock.json' -o -name 'npm-shrinkwrap.json' -o -name 'pnpm-lock.yaml' -o -name 'yarn.lock' \) | grep -q . || {
            echo "Non-Bun lockfiles must not exist in web/ or desktop/; use Bun and bun.lock instead."
            exit 1
          }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build web assets
        working-directory: web
        run: bun run build
      - name: Pack web dist
        run: tar -czf /tmp/web-dist.tgz -C web dist
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist.tgz
          if-no-files-found: error

  desktop-dist:
    needs: binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: desktop-macos-x64
            bundles: app
            desktop_os: macos
            desktop_arch: x64
            asset_ext: .dmg
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: desktop-macos-arm64
            bundles: app
            desktop_os: macos
            desktop_arch: arm64
            asset_ext: .dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: desktop-windows-x64
            bundles: msi,nsis
            desktop_os: windows
            desktop_arch: x64
            asset_ext: .msi,.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile
      - name: Build desktop sidecar
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: scripts/build-desktop-sidecar.sh "${{ matrix.target }}"
      - name: Build desktop bundles
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        working-directory: desktop
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          cargo_version="${version%%-*}"
          bun run tauri build \
            --target "${{ matrix.target }}" \
            --bundles "${{ matrix.bundles }}" \
            --config "{\"version\":\"${cargo_version}\"}"
      - name: Sign macOS app bundle
        if: ${{ matrix.desktop_os == 'macos' }}
        shell: bash
        env:
          CODESIGN_IDENTITY: "-"
          CLEAR_QUARANTINE: "0"
        run: |
          set -euo pipefail
          bundle_dir="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          app_dir="$(find "$bundle_dir" -type d -name '*.app' -print -quit)"
          if [ -z "$app_dir" ]; then
            echo "No macOS .app bundle found under $bundle_dir" >&2
            find "$bundle_dir" -print >&2
            exit 1
          fi
          scripts/sign-macos-app.sh "$app_dir"
      - name: Normalize desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bundle_dir="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          out_dir="dist/desktop/${{ matrix.artifact }}"
          mkdir -p "$out_dir"

          if [ ! -d "$bundle_dir" ]; then
            echo "Desktop bundle directory not found: $bundle_dir" >&2
            exit 1
          fi

          case "${{ matrix.desktop_os }}/${{ matrix.desktop_arch }}" in
            macos/x64)
              app_dir="$(find "$bundle_dir" -type d -name '*.app' -print -quit)"
              if [ -z "$app_dir" ]; then
                echo "No macOS .app bundle found under $bundle_dir" >&2
                find "$bundle_dir" -print >&2
                exit 1
              fi
              scripts/package-macos-dmg.sh "$app_dir" "$out_dir/NetsGo_${version}_macos_x64.dmg"
              ;;
            macos/arm64)
              app_dir="$(find "$bundle_dir" -type d -name '*.app' -print -quit)"
              if [ -z "$app_dir" ]; then
                echo "No macOS .app bundle found under $bundle_dir" >&2
                find "$bundle_dir" -print >&2
                exit 1
              fi
              scripts/package-macos-dmg.sh "$app_dir" "$out_dir/NetsGo_${version}_macos_arm64.dmg"
              ;;
            windows/x64)
              exe="$(find "$bundle_dir" -type f -name '*.exe' -print -quit)"
              msi="$(find "$bundle_dir" -type f -name '*.msi' -print -quit)"
              if [ -z "$exe" ] || [ -z "$msi" ]; then
                echo "Expected Windows NSIS .exe and MSI .msi under $bundle_dir" >&2
                find "$bundle_dir" -print >&2
                exit 1
              fi
              cp "$exe" "$out_dir/NetsGo_${version}_windows_x64-setup.exe"
              cp "$msi" "$out_dir/NetsGo_${version}_windows_x64_en-US.msi"
              ;;
            *)
              echo "Unsupported desktop artifact matrix entry: ${{ matrix.desktop_os }}/${{ matrix.desktop_arch }}" >&2
              exit 1
              ;;
          esac

          echo "Normalized desktop artifacts:"
          find "$out_dir" -type f -print | sort
      - name: Assert desktop artifact names include release version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          case "${{ matrix.asset_ext }}" in
            .msi,.exe)
              test -f "dist/desktop/${{ matrix.artifact }}/NetsGo_${version}_${{ matrix.desktop_os }}_${{ matrix.desktop_arch }}_en-US.msi"
              test -f "dist/desktop/${{ matrix.artifact }}/NetsGo_${version}_${{ matrix.desktop_os }}_${{ matrix.desktop_arch }}-setup.exe"
              ;;
            *)
              test -f "dist/desktop/${{ matrix.artifact }}/NetsGo_${version}_${{ matrix.desktop_os }}_${{ matrix.desktop_arch }}${{ matrix.asset_ext }}"
              ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/desktop/${{ matrix.artifact }}/*
          if-no-files-found: error

  verify:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Run Go tests
        run: go test ./...

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - web-dist
      - verify
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Verify embedded release public key
        env:
          NETSGO_RELEASE_SIGNING_KEY_PEM: ${{ secrets.NETSGO_RELEASE_SIGNING_KEY_PEM }}
        run: go run ./cmd/netsgo-release-sign verify-embedded scripts/common-update.sh
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error

  mirror-source-to-cnb:
    runs-on: ubuntu-latest
    needs:
      - release-gate
      - verify
    env:
      CNB_REPO_URL: ${{ secrets.CNB_REPO_URL }}
      CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
      CNB_PASSWORD: ${{ secrets.CNB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mirror main branch to CNB
        if: ${{ env.CNB_REPO_URL != '' && env.CNB_USERNAME != '' && env.CNB_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          auth="$(printf '%s:%s' "$CNB_USERNAME" "$CNB_PASSWORD" | base64 -w 0)"
          git -c http.extraHeader="Authorization: Basic ${auth}" \
            push --force "$CNB_REPO_URL" refs/remotes/origin/main:refs/heads/main
          git -c http.extraHeader="Authorization: Basic ${auth}" \
            push --force "$CNB_REPO_URL" "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

  publish-release-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - binaries
      - desktop-dist
      - mirror-source-to-cnb
    env:
      CNB_REPO_URL: ${{ secrets.CNB_REPO_URL }}
      CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
      CNB_PASSWORD: ${{ secrets.CNB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist
      - uses: actions/download-artifact@v7
        with:
          name: desktop-macos-x64
          path: /tmp/desktop-artifacts
      - uses: actions/download-artifact@v7
        with:
          name: desktop-macos-arm64
          path: /tmp/desktop-artifacts
      - uses: actions/download-artifact@v7
        with:
          name: desktop-windows-x64
          path: /tmp/desktop-artifacts
      - uses: oven-sh/setup-bun@v2
      - name: Restore current release index
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin release-index >/dev/null 2>&1; then
            tmp="$(mktemp -d)"
            git clone --depth 1 --branch release-index "https://github.com/${GITHUB_REPOSITORY}.git" "$tmp"
            mkdir -p release-index
            cp -R "$tmp/updates" release-index/ 2>/dev/null || true
          fi
      - name: Prepare CNB variables
        id: cnb-vars
        if: ${{ env.CNB_REPO_URL != '' && env.CNB_USERNAME != '' && env.CNB_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          repo_url="${CNB_REPO_URL%.git}"
          slug="${repo_url#https://cnb.cool/}"
          slug="${slug,,}"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
      - name: Finalize release checksums and GitHub assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETSGO_RELEASE_SIGNING_KEY_PEM: ${{ secrets.NETSGO_RELEASE_SIGNING_KEY_PEM }}
        run: |
          set -euo pipefail
          rm -f dist/checksums.txt dist/checksums.txt.sig dist/checksums.txt.sshsig
          while IFS= read -r -d '' artifact; do
            cp "$artifact" dist/
          done < <(find /tmp/desktop-artifacts -maxdepth 2 -type f -print0)

          assets=()
          while IFS= read -r asset; do
            assets+=("$asset")
          done < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.zip' -o -name '*.msi' -o -name '*.exe' \) -exec basename {} \; | LC_ALL=C sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found for checksum manifest" >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            (cd dist && sha256sum "$asset")
          done > dist/checksums.txt

          go run ./cmd/netsgo-release-sign dist/checksums.txt

          upload=(dist/checksums.txt dist/checksums.txt.sig dist/checksums.txt.sshsig)
          for asset in "${assets[@]}"; do
            case "$asset" in
              NetsGo_*) upload+=("dist/$asset") ;;
            esac
          done
          gh release upload "$GITHUB_REF_NAME" "${upload[@]}" --clobber
      - name: Create CNB release
        id: cnb-release
        if: ${{ steps.cnb-vars.outputs.slug != '' }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.cnb.cool/${{ steps.cnb-vars.outputs.slug }}/-/releases"
          body="$(jq -n \
            --arg tag "$GITHUB_REF_NAME" \
            --arg sha "$GITHUB_SHA" \
            --arg name "$GITHUB_REF_NAME" \
            '{
              tag_name: $tag,
              target_commitish: $sha,
              name: $name,
              body: "NetsGo release mirrored from GitHub Actions.",
              draft: false,
              prerelease: ($tag | contains("-")),
              make_latest: (if ($tag | contains("-")) then "false" else "true" end)
            }')"
          status="$(curl -sS -o /tmp/cnb-release.json -w '%{http_code}' \
            -H "Authorization: Bearer $CNB_PASSWORD" \
            -H "Accept: application/vnd.cnb.api+json" \
            -H "Content-Type: application/vnd.cnb.api+json" \
            -d "$body" \
            "$api")"
          if [ "$status" = "409" ] || [ "$status" = "422" ]; then
            status="$(curl -sS -o /tmp/cnb-release.json -w '%{http_code}' \
              -H "Authorization: Bearer $CNB_PASSWORD" \
              -H "Accept: application/vnd.cnb.api+json" \
              "https://api.cnb.cool/${{ steps.cnb-vars.outputs.slug }}/-/releases/tags/${GITHUB_REF_NAME}")"
          fi
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            cat /tmp/cnb-release.json >&2
            exit 1
          fi
          jq -r '.id' /tmp/cnb-release.json | sed 's/^/release_id=/' >> "$GITHUB_OUTPUT"
      - name: Upload CNB release attachments
        id: cnb-assets
        if: ${{ steps.cnb-release.outputs.release_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          base="https://api.cnb.cool/${{ steps.cnb-vars.outputs.slug }}/-/releases/${{ steps.cnb-release.outputs.release_id }}"
          upload_failed=0
          uploaded_assets=()

          upload_cnb_asset_once() {
            local file="$1"
            local name="$2"
            local size="$3"
            local body status upload_url verify_url

            body="$(jq -n --arg name "$name" --argjson size "$size" '{asset_name: $name, overwrite: true, size: $size, ttl: 0}')"
            if ! status="$(curl -sS -o /tmp/cnb-upload.json -w '%{http_code}' \
              -H "Authorization: Bearer $CNB_PASSWORD" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Content-Type: application/vnd.cnb.api+json" \
              -d "$body" \
              "$base/asset-upload-url")"; then
              echo "::warning::Failed to request CNB release attachment upload URL: ${name}"
              return 1
            fi
            if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
              echo "::warning::Failed to create CNB release attachment upload URL: ${name}"
              cat /tmp/cnb-upload.json >&2
              return 1
            fi

            upload_url="$(jq -r '.upload_url' /tmp/cnb-upload.json)"
            verify_url="$(jq -r '.verify_url' /tmp/cnb-upload.json)"
            if [[ "$verify_url" != http://* && "$verify_url" != https://* ]]; then
              verify_url="https://api.cnb.cool${verify_url}"
            fi
            if ! curl -fsS -X PUT --data-binary @"$file" "$upload_url" >/dev/null; then
              echo "::warning::Failed to upload CNB release attachment: ${name}"
              return 1
            fi

            if ! status="$(curl -sS -o /tmp/cnb-confirm.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer $CNB_PASSWORD" \
              -H "Accept: application/vnd.cnb.api+json" \
              "${verify_url}?ttl=0")"; then
              echo "::warning::Failed to request CNB release attachment confirmation: ${name}"
              return 1
            fi
            if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
              echo "::warning::Failed to confirm CNB release attachment: ${name}"
              cat /tmp/cnb-confirm.json >&2
              return 1
            fi
          }

          upload_cnb_asset() {
            local file="$1"
            local name="$2"
            local size="$3"
            if upload_cnb_asset_once "$file" "$name" "$size"; then
              return 0
            fi
            for attempt in 2 3; do
              echo "::warning::Retrying CNB release attachment upload (${attempt}/3): ${name}"
              sleep "$attempt"
              if upload_cnb_asset_once "$file" "$name" "$size"; then
                return 0
              fi
            done
            return 1
          }

          shopt -s nullglob
          for file in dist/netsgo_*.tar.gz dist/*.dmg dist/*.app.tar.gz dist/*.app.zip dist/*.msi dist/*.exe dist/checksums.txt dist/checksums.txt.sig dist/checksums.txt.sshsig; do
            name="$(basename "$file")"
            size="$(stat -c%s "$file")"
            if ! upload_cnb_asset "$file" "$name" "$size"; then
              upload_failed=1
              continue
            fi
            uploaded_assets+=("$name")
          done
          if [ "${#uploaded_assets[@]}" -gt 0 ]; then
            uploaded_assets_csv="$(IFS=,; echo "${uploaded_assets[*]}")"
            echo "uploaded_assets=${uploaded_assets_csv}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$upload_failed" -ne 0 ]; then
            echo "::warning::One or more CNB release attachments failed. The release index will still be published."
          fi
      - name: Build release index
        shell: bash
        run: |
          set -euo pipefail
          CNB_REPO_SLUG="${{ steps.cnb-vars.outputs.slug }}" CNB_UPLOADED_ASSETS="${{ steps.cnb-assets.outputs.uploaded_assets }}" bun scripts/release-index.mjs build
      - name: Push release-index branch to GitHub
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          worktree="$(mktemp -d)"
          git init "$worktree"
          git -C "$worktree" checkout -b release-index
          mkdir -p "$worktree/updates"
          cp -R release-index/updates "$worktree/"
          git -C "$worktree" config user.name "github-actions[bot]"
          git -C "$worktree" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$worktree" add updates
          git -C "$worktree" commit -m "release index ${GITHUB_REF_NAME}"
          git -C "$worktree" push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" release-index:release-index
      - name: Push release-index branch to CNB
        if: ${{ steps.cnb-vars.outputs.slug != '' }}
        shell: bash
        run: |
          set -euo pipefail
          worktree="$(mktemp -d)"
          git init "$worktree"
          git -C "$worktree" checkout -b release-index
          mkdir -p "$worktree/updates"
          cp -R release-index/updates "$worktree/"
          git -C "$worktree" config user.name "github-actions[bot]"
          git -C "$worktree" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$worktree" add updates
          git -C "$worktree" commit -m "release index ${GITHUB_REF_NAME}"
          auth="$(printf '%s:%s' "$CNB_USERNAME" "$CNB_PASSWORD" | base64 -w 0)"
          for attempt in 1 2 3; do
            if git -C "$worktree" -c http.extraHeader="Authorization: Basic ${auth}" \
              push --force "$CNB_REPO_URL" release-index:release-index; then
              exit 0
            fi
            sleep "$attempt"
          done
          exit 1

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - web-dist
      - verify
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      CNB_REPO_URL: ${{ secrets.CNB_REPO_URL }}
      CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
      CNB_PASSWORD: ${{ secrets.CNB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: ${{ env.CNB_REPO_URL != '' && env.CNB_USERNAME != '' && env.CNB_PASSWORD != '' }}
        with:
          registry: docker.cnb.cool
          username: ${{ env.CNB_USERNAME }}
          password: ${{ env.CNB_PASSWORD }}
      - id: release-vars
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: cnb-vars
        if: ${{ env.CNB_REPO_URL != '' && env.CNB_USERNAME != '' && env.CNB_PASSWORD != '' }}
        run: |
          repo_url="${CNB_REPO_URL%.git}"
          slug="${repo_url#https://cnb.cool/}"
          slug="${slug,,}"
          echo "image=docker.cnb.cool/${slug}" >> "$GITHUB_OUTPUT"
      - id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: meta-dockerhub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: meta-cnb
        if: ${{ steps.cnb-vars.outputs.image != '' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.cnb-vars.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-cnb.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            NETSGO_VERSION=${{ steps.release-vars.outputs.tag }}
            NETSGO_COMMIT=${{ github.sha }}
            NETSGO_DATE=${{ steps.release-vars.outputs.date }}

  scan-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    needs: docker
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: release-vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.release-vars.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
