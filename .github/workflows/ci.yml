name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint web
        working-directory: web
        run: bun run lint
      - name: Build web assets
        working-directory: web
        run: bun run build
      - name: Pack web dist
        run: tar -czf /tmp/web-dist.tgz -C web dist
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: /tmp/web-dist.tgz
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  govulncheck:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  test:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run Go vet
        run: go vet ./...
      - name: Run Go tests
        run: go test ./...

  test-race:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run Go race tests
        run: make test-race

  test-e2e:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Run E2E Nginx
        run: make test-e2e-nginx
      - name: Run E2E Caddy
        run: make test-e2e-caddy

  cross-build:
    runs-on: ubuntu-latest
    needs: web-dist
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            ext: ""
          - goos: linux
            goarch: arm64
            goarm: ""
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm != '' && format('/v{0}', matrix.goarm) || '' }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          OUTPUT_EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=0
          if [ -n "${GOARM}" ]; then
            export GOARM
          fi
          output="${RUNNER_TEMP}/netsgo${OUTPUT_EXT}"
          go build -trimpath -ldflags "-s -w" -o "${output}" ./cmd/netsgo
          test -f "${output}"