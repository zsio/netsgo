name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject non-Bun lockfiles in frontend workspaces
        run: |
          ! find web desktop -maxdepth 1 \( -name 'package-lock.json' -o -name 'npm-shrinkwrap.json' -o -name 'pnpm-lock.yaml' -o -name 'yarn.lock' \) | grep -q . || {
            echo "Non-Bun lockfiles must not exist in web/ or desktop/; use Bun and bun.lock instead."
            exit 1
          }
      - uses: oven-sh/setup-bun@v2
      - name: Verify install/update scripts
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/common-update.sh scripts/install.sh scripts/upgrade.sh scripts/test-update-helpers.sh; do
            sh -n "$script"
          done
          for script in test/e2e/scripts/*.sh; do
            bash -n "$script"
          done
          scripts/test-update-helpers.sh
          bun scripts/generate-standalone-update-scripts.mjs
          git diff --exit-code scripts/install.sh scripts/upgrade.sh
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint web
        working-directory: web
        run: bun run lint
      - name: Build web assets
        working-directory: web
        run: bun run build
      - name: Pack web dist
        run: tar -czf /tmp/web-dist.tgz -C web dist
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist.tgz
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  govulncheck:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  test:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run Go vet
        run: go vet ./...
      - name: Run Go tests
        run: go test ./...
      - name: Verify Linux service env permissions
        shell: bash
        run: |
          set -euo pipefail
          sudo groupadd --system netsgo 2>/dev/null || true
          if ! id -u netsgo >/dev/null 2>&1; then
            sudo useradd --system --no-create-home --shell /usr/sbin/nologin -g netsgo netsgo
          fi
          sudo env \
            "PATH=${PATH}" \
            "HOME=${HOME}" \
            "GOCACHE=$(go env GOCACHE)" \
            "GOMODCACHE=$(go env GOMODCACHE)" \
            NETSGO_PRIVILEGED_ENV_TEST=1 \
            go test ./internal/svcmgr -run '^TestRepairEnvFileOwnershipPrivileged$' -count=1 -v

  test-race:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: web-dist-archive
      - name: Restore web dist
        shell: bash
        run: tar -xzf web-dist-archive/web-dist.tgz -C web
      - name: Run Go race tests
        run: make test-race

  test-e2e:
    runs-on: ubuntu-latest
    needs: web-dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Run E2E Nginx
        run: make test-system-e2e-nginx
      - name: Run E2E Caddy
        run: make test-system-e2e-caddy
      - uses: oven-sh/setup-bun@v2
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: web
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright client-to-client smoke E2E
        env:
          PLAYWRIGHT_RUNNER: xvfb-run -a
        run: make test-playwright-e2e-smoke

  cross-version-smoke:
    runs-on: ubuntu-latest
    needs: web-dist
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
      - uses: docker/setup-buildx-action@v4
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Verify compatibility baseline tag exists
        shell: bash
        run: git rev-parse --verify "refs/tags/v0.1.8" >/dev/null
      - name: Run stable-only baseline smoke
        run: |
          make test-baseline-e2e \
            COMPAT_BASELINE=v0.1.8 \
            BASELINE_REBUILD_IMAGE=true \
            BASELINE_MODE=smoke
      - name: Run mixed-version compatibility smoke
        run: |
          make test-compat-e2e \
            COMPAT_BASELINE=v0.1.8 \
            COMPAT_MODE=smoke \
            COMPAT_ABORT_ON_FAILURE=true

  cross-build:
    runs-on: ubuntu-latest
    needs: web-dist
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: /tmp/web-dist
      - name: Restore web dist
        run: tar -xzf /tmp/web-dist/web-dist.tgz -C web
      - name: Cross-compile Linux CLI ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm != '' && format('/v{0}', matrix.goarm) || '' }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=0
          if [ -n "${GOARM}" ]; then
            export GOARM
          fi
          output="${RUNNER_TEMP}/netsgo"
          go build -trimpath -ldflags "-s -w" -o "${output}" ./cmd/netsgo
          test -f "${output}"

  ci-required:
    runs-on: ubuntu-latest
    needs:
      - web-dist
      - lint
      - govulncheck
      - test
      - test-race
      - test-e2e
      - cross-version-smoke
      - cross-build
    if: ${{ always() }}
    steps:
      - name: Check required CI jobs
        run: |
          set -euo pipefail
          failed=0

          check_result() {
            local job="$1"
            local result="$2"
            if [ "${result}" != "success" ]; then
              echo "${job} finished with result: ${result}"
              failed=1
            fi
          }

          check_result web-dist "${{ needs['web-dist'].result }}"
          check_result lint "${{ needs.lint.result }}"
          check_result govulncheck "${{ needs.govulncheck.result }}"
          check_result test "${{ needs.test.result }}"
          check_result test-race "${{ needs['test-race'].result }}"
          check_result test-e2e "${{ needs['test-e2e'].result }}"
          check_result cross-version-smoke "${{ needs['cross-version-smoke'].result }}"
          check_result cross-build "${{ needs['cross-build'].result }}"

          exit "${failed}"
