version: 2

project_name: netsgo

release:
  prerelease: auto

builds:
  - id: netsgo-linux
    main: ./cmd/netsgo
    binary: netsgo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X netsgo/pkg/version.Current={{ .Tag }} -X netsgo/pkg/version.Commit={{ .FullCommit }} -X netsgo/pkg/version.Date={{ .Date }}
  - id: netsgo-linux-armv7
    main: ./cmd/netsgo
    binary: netsgo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - "7"
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X netsgo/pkg/version.Current={{ .Tag }} -X netsgo/pkg/version.Commit={{ .FullCommit }} -X netsgo/pkg/version.Date={{ .Date }}

archives:
  - id: release-bundles
    files:
      - README.md
      - LICENSE
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if and (eq .Arch "arm") (eq .Arm "7") }}armv7{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
