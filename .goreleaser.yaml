version: 2

project_name: netsgo

release:
  prerelease: auto
  header: |
    ## Quick Install / Upgrade

    **One-line install:**

    ```bash
    curl -fsSL https://netsgo.zs.uy/install.sh | sh{{ if .Prerelease }} -s -- --channel beta{{ end }}
    ```

    **One-line upgrade:**

    ```bash
    curl -fsSL https://netsgo.zs.uy/upgrade.sh | sh -s -- -y{{ if .Prerelease }} --channel beta{{ end }}
    ```

    **Windows / macOS clients:** Desktop installers are no longer published with releases; run the NetsGo client with Docker instead (image: `zsio/netsgo`).

builds:
  - id: netsgo-linux
    main: ./cmd/netsgo
    binary: netsgo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X netsgo/pkg/version.Current={{ .Tag }} -X netsgo/pkg/version.Commit={{ .FullCommit }} -X netsgo/pkg/version.Date={{ .Date }}
  - id: netsgo-linux-armv7
    main: ./cmd/netsgo
    binary: netsgo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - "7"
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X netsgo/pkg/version.Current={{ .Tag }} -X netsgo/pkg/version.Commit={{ .FullCommit }} -X netsgo/pkg/version.Date={{ .Date }}

archives:
  - id: release-bundles
    files:
      - README.md
      - LICENSE
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if and (eq .Arch "arm") (eq .Arm "7") }}armv7{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
